services:
  # --- DASHBOARD ---
  homarr:
      container_name: homarr
      image: ghcr.io/homarr-labs/homarr:latest
      restart: unless-stopped
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
        - ./homarr/appdata:/appdata
      environment:
        - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}
      ports:
        - '7575:7575'
      networks:
        - nginx-proxy-network
        - homelab_internal
       
  # --- BANCOS DE DADOS ---
  mysql_db:
    image: mysql:8.0
    container_name: homelab_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: dolibarr
    networks:
      - homelab_internal
    volumes:
      - mysql_data:/var/lib/mysql

  db_postgres:
    image: postgres:15
    container_name: homelab_postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - homelab_internal
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    container_name: homelab_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks:
      - homelab_internal
    volumes:
      - mongodb_data:/data/db

  # Redis para suporte ao Sure e outras aplicações
  db_redis:
    image: redis:alpine
    container_name: homelab_redis
    restart: always
    networks:
      - homelab_internal

  # --- FINANCE APP ---
  sure:
    image: ghcr.io/we-promise/sure:stable
    container_name: homelab_sure
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${SURE_POSTGRES_DB}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - SECRET_KEY_BASE=${SURE_SECRET_KEY_BASE}
      - REDIS_URL=redis://homelab_redis:6379/0
      - TZ=America/Sao_Paulo
    networks:
      - homelab_internal
      - nginx-proxy-network
    depends_on:
      - db_postgres
      - db_redis
    volumes:
      - sure_data:/app/storage

  actual_budget:
    image: actualbudget/actual-server:latest
    container_name: homelab_actual_budget
    restart: always
    ports:
      - '5006:5006'
    networks:
      - homelab_internal
      - nginx-proxy-network
    volumes:
      - actual_data:/data

  # --- LOW-CODE & AUTOMATION ---
  appsmith:
    image: index.docker.io/appsmith/appsmith-ce
    container_name: homelab_appsmith
    restart: always
    environment:
      - APPSMITH_REPLICATION_ENABLED=false
      - APPSMITH_TRUST_PROXY=true
    networks:
      - homelab_internal
      - nginx-proxy-network
    volumes:
      - appsmith_data:/appsmith-stacks

  budibase:
    image: budibase/budibase:latest
    container_name: homelab_budibase
    restart: always
    networks:
      - homelab_internal
      - nginx-proxy-network
    volumes:
      - budibase_data:/manage

  # --- CI/CD & ORCHESTRATION ---
  jenkins:
    image: jenkins/jenkins:lts
    container_name: homelab_jenkins
    restart: always
    user: ${JEKNKINS_ROOT_USER}
    networks:
      - homelab_internal
      - nginx-proxy-network
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-webserver:
    build: 
      context: ./airflow-custom
    container_name: homelab_airflow
    restart: always
    depends_on:
      - db_postgres
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DB_CONN}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    networks:
      - homelab_internal
      - nginx-proxy-network
    volumes:
      - airflow_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command: webserver

  airflow-scheduler:
    build: 
      context: ./airflow-custom
    container_name: homelab_airflow_scheduler
    restart: always
    depends_on:
      - airflow-webserver
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DB_CONN}
    networks:
      - homelab_internal
    volumes:
      - airflow_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command: scheduler

  # --- BUSINESS APPS ---
  dolibarr:
    image: upshift/dolibarr:latest
    container_name: homelab_dolibarr
    restart: always
    environment:
       DOLIBARR_ADMIN_USER: ${DOLI_ADMIN_USER}
       DOLIBARR_ADMIN_PASSWORD: ${DOLI_ADMIN_PASS}
       DOLI_DB_TYPE: mysqli
       DOLI_DB_HOST: mysql_db
       DOLI_DB_USER: ${MYSQL_ROOT_USER}
       DOLI_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
       DOLI_DB_NAME: ${MYSQL_DB_SCHEMA}
       DOLI_DB_PREFIX: llx_
    networks:
      - homelab_internal
      - nginx-proxy-network
    depends_on:
      - mysql_db

  n8n:
    image: n8nio/n8n:latest
    container_name: homelab_n8n
    restart: always
    networks:
      - homelab_internal
      - nginx-proxy-network
    depends_on:
      - db_postgres
    volumes:
      - n8n_data:/home/node/.n8n

  # --- DATA SCIENCE (HADOOP HDFS & SPARK) ---
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: homelab_namenode
    restart: always
    environment:
      - CLUSTER_NAME=homelab_hdfs
    networks:
      - homelab_internal
      - nginx-proxy-network
    volumes:
      - namenode_data:/hadoop/dfs/name
      
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: homelab_datanode
    restart: always
    environment:
      - SERVICE_PRECONDITION=homelab_namenode:9870
    networks:
      - homelab_internal
    depends_on:
      - namenode
    volumes:
      - datanode_data:/hadoop/dfs/data

  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: homelab_spark_master
    restart: always
    environment:
      - SPARK_MODE=master
    networks:
      - homelab_internal
      - nginx-proxy-network

  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: homelab_spark_worker
    restart: always
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
    networks:
      - homelab_internal
    depends_on:
      - spark-master

  # --- SIEM & XDR (WAZUH) ---
  wazuh.manager:
    image: wazuh/wazuh-manager:5.1.0
    hostname: wazuh.manager
    container_name: single-node-wazuh.manager
    restart: always
    networks:
      - homelab_internal
    depends_on:
      wazuh.indexer:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "/var/wazuh-manager/bin/wazuh-manager-control status 2>/dev/null | grep -q 'not running' && exit 1 || exit 0" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - WAZUH_INDEXER_HOSTS=wazuh.indexer:9200
      - WAZUH_NODE_NAME=manager
      - WAZUH_CLUSTER_NODES=wazuh.manager
      - WAZUH_CLUSTER_BIND_ADDR=wazuh.manager
      - INDEXER_USERNAME=${WAZUH_INDEXER_USERNAME}
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD}
    volumes:
      - wazuh_api_configuration:/var/wazuh-manager/api/configuration
      - wazuh_etc:/var/wazuh-manager/etc
      - wazuh_logs:/var/wazuh-manager/logs
      - wazuh_queue:/var/wazuh-manager/queue
      - wazuh_var_multigroups:/var/wazuh-manager/var/multigroups
      - ./config/root-ca/certs/root-ca.pem:/var/wazuh-manager/etc/certs/root-ca.pem
      - ./config/wazuh_manager/certs/wazuh.manager.pem:/var/wazuh-manager/etc/certs/manager.pem
      - ./config/wazuh_manager/certs/wazuh.manager-key.pem:/var/wazuh-manager/etc/certs/manager-key.pem

  wazuh.indexer:
    image: wazuh/wazuh-indexer:5.1.0
    hostname: wazuh.indexer
    container_name: single-node-wazuh.indexer
    restart: always
    networks:
      - homelab_internal
    ports:
      - "9200:9200"
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
      - network.host=0.0.0.0
      - node.name=wazuh.indexer
      - cluster.initial_cluster_manager_nodes=wazuh.indexer
      - node.max_local_storage_nodes=1
      - plugins.security.allow_default_init_securityindex=true
      - NODES_DN=CN=wazuh.indexer,OU=Wazuh,O=Wazuh,L=California,C=US
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: [ "CMD-SHELL", "curl -fks https://localhost:9200/_plugins/_security/health | grep -q '\"status\":\"UP\"'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/root-ca/certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./config/wazuh_indexer/certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/indexer-key.pem
      - ./config/wazuh_indexer/certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/indexer.pem
      - ./config/wazuh_indexer/certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ./config/wazuh_indexer/certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:5.1.0
    hostname: wazuh.dashboard
    container_name: single-node-wazuh.dashboard
    restart: always
    networks:
      - homelab_internal
      - nginx-proxy-network
    healthcheck:
      test: [ "CMD", "curl", "-k", "-s", "-o", "/dev/null", "https://localhost:5601/login" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "8443:5601"
    environment:
      - SERVER_PORT=5601
      - SERVER_HOST=0.0.0.0
      - OPENSEARCH_HOSTS=https://wazuh.indexer:9200
      - INDEXER_USERNAME=${WAZUH_INDEXER_USERNAME}
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=${WAZUH_DASHBOARD_USERNAME}
      - DASHBOARD_PASSWORD=${WAZUH_DASHBOARD_PASSWORD}
      - SERVER_SSL_CERTIFICATE=/usr/share/wazuh-dashboard/config/certs/dashboard.pem
      - SERVER_SSL_KEY=/usr/share/wazuh-dashboard/config/certs/dashboard-key.pem
      - OPENSEARCH_SSL_CERTIFICATE_AUTHORITIES=/usr/share/wazuh-dashboard/config/certs/root-ca.pem
    volumes:
      - ./config/wazuh_dashboard/certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/config/certs/dashboard.pem
      - ./config/wazuh_dashboard/certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/config/certs/dashboard-key.pem
      - ./config/root-ca/certs/root-ca.pem:/usr/share/wazuh-dashboard/config/certs/root-ca.pem
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      wazuh.indexer:
        condition: service_healthy
      wazuh.manager:
        condition: service_healthy

networks:
  homelab_internal:
    driver: bridge
  nginx-proxy-network:
    external: true

volumes:
  mysql_data:
  postgres_data:
  mongodb_data:
  appsmith_data:
  budibase_data:
  n8n_data:
  heimdall_config:
  airflow_dags:
  airflow_logs:
  airflow_plugins:
  jenkins_data:
  sure_data:
  namenode_data:
  datanode_data:
  actual_data:
  # Volumes adicionados do Wazuh:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
